<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>염기서열 찾기</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #1b2330;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: #222;
  }
  #app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    background: #f4f1e8;
    position: relative;
    overflow: hidden;
  }
  .screen { display: none; flex-direction: column; min-height: 100vh; padding: 16px; }
  .screen.active { display: flex; }

  /* ---------- 시작 화면 ---------- */
  #startScreen { align-items: center; justify-content: center; text-align: center; gap: 18px; }
  #startScreen h1 { font-size: 26px; margin: 4px 0 0; color: #2c2c2a; font-weight: 700; }
  #startScreen p.sub { font-size: 13px; color: #6b6a63; margin: 0 0 6px; line-height: 1.6; }
  .startBtn {
    margin-top: 10px;
    padding: 14px 48px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    background: #378ADD;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 0 #1d5fa0;
  }
  .startBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1d5fa0; }

  /* ---------- 게임 화면 ---------- */
  #gameScreen { gap: 10px; }
  .topBar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 4px 2px;
  }
  .progressBox {
    font-size: 13px; color: #6b6a63; font-weight: 700;
    background: #fff; border: 1.5px solid #d8d4c4; border-radius: 10px;
    padding: 6px 12px;
  }
  .progressBox span { color: #378ADD; font-size: 16px; }
  .scoreBox {
    font-size: 13px; color: #6b6a63; font-weight: 700;
    background: #fff; border: 1.5px solid #d8d4c4; border-radius: 10px;
    padding: 6px 12px;
  }

  .dnaWrap {
    background: #fff;
    border: 1.5px solid #d8d4c4;
    border-radius: 14px;
    padding: 14px 8px 10px;
    margin-top: 4px;
  }
  .dnaLabel { font-size: 12px; color: #9c997f; text-align: center; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
  .dnaRow {
    display: flex; justify-content: center; flex-wrap: wrap;
    gap: 3px 5px;
  }
  .codonGroup { display: flex; flex-direction: column; align-items: center; }
  .codonBases { display: flex; gap: 3px; }
  .baseTile {
    width: 22px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px;
    border-radius: 5px;
    background: #FAEEDA;
    color: #633806;
    border: 1px solid #EF9F27;
  }
  .answerSlot {
    margin-top: 5px;
    min-height: 20px;
    font-size: 11px;
    font-weight: 700;
    color: #0F6E56;
    background: #E1F5EE;
    border: 1px solid #5DCAA5;
    border-radius: 6px;
    padding: 2px 4px;
    text-align: center;
    cursor: pointer;
    white-space: nowrap;
    min-width: 40px;
  }
  .answerSlot.empty { background: transparent; border: 1px dashed #c7c3b2; color: #c7c3b2; }
  .codonSep { width: 8px; }

  .confirmBtn {
    margin: 8px auto 4px;
    display: block;
    padding: 10px 36px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: #639922;
    border: none;
    border-radius: 24px;
    cursor: pointer;
  }
  .confirmBtn:disabled { background: #b4b2a9; cursor: not-allowed; }

  .hintText { font-size: 11.5px; color: #6b6a63; text-align: center; line-height: 1.5; margin: 2px 0 4px; }

  .aaGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 4px;
  }
  .aaBtn {
    background: #fff;
    border: 1.5px solid #d8d4c4;
    border-radius: 10px;
    padding: 6px 4px;
    text-align: center;
    cursor: pointer;
  }
  .aaBtn:active { background: #e6f1fb; border-color: #378ADD; }
  .aaBtn.stopBtn { background: #FCEBEB; border-color: #E24B4A; }
  .aaName { font-size: 12.5px; font-weight: 700; color: #2c2c2a; }
  .aaCodons { font-size: 9.5px; color: #888780; margin-top: 1px; line-height: 1.3; }

  /* ---------- 결과 화면 ---------- */
  #resultScreen { gap: 12px; }
  .resultHeader { text-align: center; padding: 18px 0 4px; }
  .resultHeader h2 { margin: 0; font-size: 22px; color: #2c2c2a; }
  .resultScoreNum { font-size: 38px; font-weight: 700; color: #378ADD; margin: 6px 0; }
  .reviewCard {
    background: #fff; border: 1.5px solid #d8d4c4; border-radius: 12px;
    padding: 12px; margin-bottom: 4px;
  }
  .reviewCard.correct { border-left: 4px solid #639922; }
  .reviewCard.wrong { border-left: 4px solid #E24B4A; }
  .reviewTitle { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .reviewDna { font-size: 13px; letter-spacing: 1px; font-family: monospace; color: #444441; margin-bottom: 6px; word-break: break-all; }
  .reviewLine { font-size: 12px; margin: 2px 0; color: #5f5e5a; }
  .reviewLine b { color: #2c2c2a; }
  .reviewLine.wrongAnswer b.userAns { color: #E24B4A; }
  .reviewLine.wrongAnswer b.correctAns { color: #639922; }
  .doneBtn {
    margin: 8px auto 4px;
    display: block;
    padding: 13px 40px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: #378ADD;
    border: none;
    border-radius: 26px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">

  <!-- 시작 화면 -->
  <div id="startScreen" class="screen active">
    <svg width="220" height="190" viewBox="0 0 220 190" xmlns="http://www.w3.org/2000/svg">
      <g stroke-width="3" fill="none">
        <path id="helix1" d="M30,10 C55,30 5,50 30,70 C55,90 5,110 30,130 C55,150 5,170 30,190" stroke="#378ADD"/>
        <path id="helix2" d="M70,10 C45,30 95,50 70,70 C45,90 95,110 70,130 C45,150 95,170 70,190" stroke="#0F6E56"/>
      </g>
      <g stroke="#EF9F27" stroke-width="2.5">
        <line x1="33" y1="20" x2="67" y2="20"/>
        <line x1="40" y1="40" x2="60" y2="40"/>
        <line x1="33" y1="60" x2="67" y2="60"/>
        <line x1="40" y1="80" x2="60" y2="80"/>
        <line x1="33" y1="100" x2="67" y2="100"/>
        <line x1="40" y1="120" x2="60" y2="120"/>
        <line x1="33" y1="140" x2="67" y2="140"/>
        <line x1="40" y1="160" x2="60" y2="160"/>
        <line x1="33" y1="180" x2="67" y2="180"/>
      </g>
      <text x="14" y="15" font-size="11" fill="#888780" font-weight="700">DNA</text>

      <g stroke-width="3" fill="none" transform="translate(110,0)">
        <path d="M50,15 C70,35 70,55 50,75 C30,95 30,115 50,135 C70,155 70,175 50,190" stroke="#D4537E"/>
      </g>
      <g fill="#D4537E">
        <circle cx="50" cy="25" r="4"/>
        <circle cx="50" cy="50" r="4"/>
        <circle cx="50" cy="75" r="4"/>
        <circle cx="50" cy="100" r="4"/>
        <circle cx="50" cy="125" r="4"/>
        <circle cx="50" cy="150" r="4"/>
        <circle cx="50" cy="175" r="4"/>
      </g>
      <text x="142" y="15" font-size="11" fill="#888780" font-weight="700">RNA</text>
    </svg>

    <h1>염기서열 찾기</h1>
    <p class="sub">DNA 염기서열을 보고, 상보결합하는<br>RNA 코돈이 지정하는 아미노산을 찾아보세요!</p>
    <button class="startBtn" onclick="goToGame()">시작하기</button>
  </div>

  <!-- 게임 화면 -->
  <div id="gameScreen" class="screen">
    <div class="topBar">
      <div class="progressBox">문제 <span id="qNum">1</span> / 5</div>
      <div class="scoreBox">정답 <span id="scoreNow" style="color:#639922;">0</span></div>
    </div>

    <div class="dnaWrap">
      <div class="dnaLabel">DNA 염기서열 (주형 가닥)</div>
      <div class="dnaRow" id="dnaRow"></div>
    </div>

    <p class="hintText">DNA 염기와 상보결합(A-U, T-A, G-C, C-G)하는 RNA 코돈을 떠올려<br>아래 버튼에서 해당 아미노산을 골라 순서대로 눌러보세요.</p>

    <button class="confirmBtn" id="confirmBtn" disabled onclick="confirmAnswer()">확인</button>

    <div class="aaGrid" id="aaGrid"></div>
  </div>

  <!-- 결과 화면 -->
  <div id="resultScreen" class="screen">
    <div class="resultHeader">
      <h2>결과</h2>
      <div class="resultScoreNum"><span id="finalScore">0</span> / 5</div>
    </div>
    <div id="reviewList"></div>
    <button class="doneBtn" onclick="goToStart()">확인완료</button>
  </div>

</div>

<script>
/* ===================== 코돈표 데이터 (사용자 제공 표 기준) ===================== */
const codonTable = {
  'UUU':'페닐알라닌','UUC':'페닐알라닌',
  'UUA':'류신','UUG':'류신','CUU':'류신','CUC':'류신','CUA':'류신','CUG':'류신',
  'UCU':'세린','UCC':'세린','UCA':'세린','UCG':'세린','AGU':'세린','AGC':'세린',
  'UAU':'타이로신','UAC':'타이로신',
  'UGU':'시스테인','UGC':'시스테인',
  'UGG':'트립토판',
  'CCU':'프롤린','CCC':'프롤린','CCA':'프롤린','CCG':'프롤린',
  'CAU':'히스티딘','CAC':'히스티딘',
  'CAA':'글루타민','CAG':'글루타민',
  'CGU':'아르지닌','CGC':'아르지닌','CGA':'아르지닌','CGG':'아르지닌','AGA':'아르지닌','AGG':'아르지닌',
  'AUU':'아이소류신','AUC':'아이소류신','AUA':'아이소류신',
  'AUG':'메싸이오닌(시작코돈)',
  'ACU':'트레오닌','ACC':'트레오닌','ACA':'트레오닌','ACG':'트레오닌',
  'AAU':'아스파라긴','AAC':'아스파라긴',
  'AAA':'라이신','AAG':'라이신',
  'GUU':'발린','GUC':'발린','GUA':'발린','GUG':'발린',
  'GCU':'알라닌','GCC':'알라닌','GCA':'알라닌','GCG':'알라닌',
  'GAU':'아스파르트산','GAC':'아스파르트산',
  'GAA':'글루탐산','GAG':'글루탐산',
  'GGU':'글라이신','GGC':'글라이신','GGA':'글라이신','GGG':'글라이신',
  'UAA':'종결코돈','UAG':'종결코돈','UGA':'종결코돈'
};

const aaButtons = [
  {name:'페닐알라닌', codons:'UUU, UUC'},
  {name:'류신', codons:'UUA, UUG, CUU, CUC, CUA, CUG'},
  {name:'세린', codons:'UCU, UCC, UCA, UCG, AGU, AGC'},
  {name:'타이로신', codons:'UAU, UAC'},
  {name:'시스테인', codons:'UGU, UGC'},
  {name:'트립토판', codons:'UGG'},
  {name:'프롤린', codons:'CCU, CCC, CCA, CCG'},
  {name:'히스티딘', codons:'CAU, CAC'},
  {name:'글루타민', codons:'CAA, CAG'},
  {name:'아르지닌', codons:'CGU, CGC, CGA, CGG, AGA, AGG'},
  {name:'아이소류신', codons:'AUU, AUC, AUA'},
  {name:'메싸이오닌(시작코돈)', codons:'AUG'},
  {name:'트레오닌', codons:'ACU, ACC, ACA, ACG'},
  {name:'아스파라긴', codons:'AAU, AAC'},
  {name:'라이신', codons:'AAA, AAG'},
  {name:'발린', codons:'GUU, GUC, GUA, GUG'},
  {name:'알라닌', codons:'GCU, GCC, GCA, GCG'},
  {name:'아스파르트산', codons:'GAU, GAC'},
  {name:'글루탐산', codons:'GAA, GAG'},
  {name:'글라이신', codons:'GGU, GGC, GGA, GGG'},
  {name:'종결코돈', codons:'UAA, UAG, UGA', isStop:true}
];

const senseCodons = Object.keys(codonTable).filter(c => codonTable[c] !== '종결코돈' && c !== 'AUG');
const stopCodons = ['UAA','UAG','UGA'];

function dnaFromRnaBase(r){ return {A:'T', U:'A', G:'C', C:'G'}[r]; }

/* ===================== 게임 상태 ===================== */
let state = {
  questions: [],
  currentQ: 0,
  score: 0,
  answers: [],     // 현재 문제의 7칸 답안 (이름)
};

function randItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generateQuestion(){
  const stop = randItem(stopCodons);
  const mid = [];
  for(let i=0;i<5;i++) mid.push(randItem(senseCodons));
  const rnaCodons = ['AUG', ...mid, stop];
  const dnaSeq = rnaCodons.map(codon =>
    codon.split('').map(dnaFromRnaBase).join('')
  ).join('');
  const correctAnswers = rnaCodons.map(c => codonTable[c]);
  return { dnaSeq, rnaCodons, correctAnswers };
}

function buildQuestions(){
  state.questions = [];
  for(let i=0;i<5;i++) state.questions.push(generateQuestion());
}

/* ===================== 화면 전환 ===================== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToStart(){
  showScreen('startScreen');
}

function goToGame(){
  buildQuestions();
  state.currentQ = 0;
  state.score = 0;
  renderAaGrid();
  loadQuestion();
  showScreen('gameScreen');
}

/* ===================== 게임 화면 렌더링 ===================== */
function renderAaGrid(){
  const grid = document.getElementById('aaGrid');
  grid.innerHTML = '';
  aaButtons.forEach(aa => {
    const btn = document.createElement('div');
    btn.className = 'aaBtn' + (aa.isStop ? ' stopBtn' : '');
    btn.innerHTML = `<div class="aaName">${aa.name}</div><div class="aaCodons">${aa.codons}</div>`;
    btn.onclick = () => selectAnswer(aa.name);
    grid.appendChild(btn);
  });
}

function loadQuestion(){
  const q = state.questions[state.currentQ];
  state.answers = new Array(7).fill(null);
  document.getElementById('qNum').textContent = state.currentQ + 1;
  document.getElementById('scoreNow').textContent = state.score;
  renderDna(q);
  updateConfirmBtn();
}

function renderDna(q){
  const row = document.getElementById('dnaRow');
  row.innerHTML = '';
  for(let i=0;i<7;i++){
    const group = document.createElement('div');
    group.className = 'codonGroup';

    const basesDiv = document.createElement('div');
    basesDiv.className = 'codonBases';
    const codonStr = q.dnaSeq.substr(i*3, 3);
    codonStr.split('').forEach(b => {
      const tile = document.createElement('div');
      tile.className = 'baseTile';
      tile.textContent = b;
      basesDiv.appendChild(tile);
    });
    group.appendChild(basesDiv);

    const slot = document.createElement('div');
    slot.className = 'answerSlot empty';
    slot.textContent = '?';
    slot.dataset.idx = i;
    slot.onclick = () => clearSlot(i);
    group.appendChild(slot);

    row.appendChild(group);
  }
}

function selectAnswer(name){
  const idx = state.answers.findIndex(a => a === null);
  if(idx === -1) return;
  state.answers[idx] = name;
  const slot = document.querySelector(`.answerSlot[data-idx="${idx}"]`);
  slot.textContent = name;
  slot.classList.remove('empty');
  updateConfirmBtn();
}

function clearSlot(idx){
  if(state.answers[idx] === null) return;
  state.answers[idx] = null;
  const slot = document.querySelector(`.answerSlot[data-idx="${idx}"]`);
  slot.textContent = '?';
  slot.classList.add('empty');
  updateConfirmBtn();
}

function updateConfirmBtn(){
  const allFilled = state.answers.every(a => a !== null);
  document.getElementById('confirmBtn').disabled = !allFilled;
}

function confirmAnswer(){
  const q = state.questions[state.currentQ];
  const isCorrect = q.correctAnswers.every((c,i) => c === state.answers[i]);
  q.userAnswers = state.answers.slice();
  q.isCorrect = isCorrect;
  if(isCorrect) state.score++;

  if(state.currentQ < 4){
    state.currentQ++;
    loadQuestion();
  } else {
    showResult();
  }
}

/* ===================== 결과 화면 ===================== */
function showResult(){
  document.getElementById('finalScore').textContent = state.score;
  const list = document.getElementById('reviewList');
  list.innerHTML = '';

  state.questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'reviewCard ' + (q.isCorrect ? 'correct' : 'wrong');

    let html = `<div class="reviewTitle">${qi+1}번 문제 — ${q.isCorrect ? '정답' : '오답'}</div>`;
    html += `<div class="reviewDna">DNA: ${q.dnaSeq.split('').join(' ')}</div>`;

    if(!q.isCorrect){
      q.correctAnswers.forEach((c, i) => {
        const user = q.userAnswers[i];
        if(user !== c){
          html += `<div class="reviewLine wrongAnswer">${i+1}번째 코돈 — 내 답: <b class="userAns">${user}</b> / 정답: <b class="correctAns">${c}</b></div>`;
        }
      });
    } else {
      html += `<div class="reviewLine">모든 코돈을 정확히 맞췄어요!</div>`;
    }

    card.innerHTML = html;
    list.appendChild(card);
  });

  showScreen('resultScreen');
}
</script>
</body>
</html>
